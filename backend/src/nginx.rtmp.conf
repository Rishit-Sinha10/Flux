# ============================================================
# NGINX RTMP Configuration for Local Development
# ============================================================
# Setup Instructions:
# 1. Install Nginx with RTMP module on your machine
# 2. Copy this config to /etc/nginx/nginx.conf (Linux/Mac) 
#    or adjust the path based on your installation
# 3. Restart Nginx: sudo nginx -s reload
# 4. Verify RTMP server is running: nginx -T
#
# For Windows: 
#   - Install Nginx from http://nginx.org/en/download.html
#   - Copy this config to nginx/conf/nginx.conf
#   - Start: nginx.exe or via Services
#
# For Docker setup, see docker-compose-nginx.yml
# ============================================================

worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
  worker_connections 4096;
}

# ==================== RTMP STREAMING ====================
rtmp {
  server {
    listen 1935;
    chunk_size 4096;
    max_message 12M;

    # 🎬 LIVE APPLICATION - Direct RTMP streaming
    application live {
      live on;
      record off;
      
      allow publish 127.0.0.1;
      allow publish 192.168.1.0/24;
      deny publish all;
      
      allow play all;

      # ✅ HLS Output - Convert RTMP to HLS for viewers
      hls on;
      hls_path C:/Users/DELL/Documents/p/nginx-rtmp-win32-1.2.1/hls;
      hls_fragment 10s;
      hls_playlist_length 60s;
      hls_cleanup on;

      # Optional: DASH output for adaptive streaming
      dash on;
      dash_path C:/Users/DELL/Documents/p/nginx-rtmp-win32-1.2.1/dash;
      dash_fragment 10s;
      dash_playlist_length 60s;
    }

    # Stream statistics endpoint
    application stat {
      live on;
      record off;
    }
  }
}

# ==================== HTTP SERVER ====================
http {
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log logs/access.log main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  gzip on;

  server {
    listen 8080;
    server_name localhost;

    # HLS streaming endpoint
    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      
      alias C:/Users/DELL/Documents/p/nginx-rtmp-win32-1.2.1/hls;
      expires -1;
      add_header Cache-Control "public, max-age=0";
      add_header Access-Control-Allow-Origin *;
    }

    # DASH streaming endpoint
    location /dash {
      types {
        application/dash+xml mpd;
        video/mp4 mp4;
      }
      
      alias C:/Users/DELL/Documents/p/nginx-rtmp-win32-1.2.1/dash;
      expires -1;
      add_header Cache-Control "public, max-age=0";
      add_header Access-Control-Allow-Origin *;
    }

    # Stream statistics (XML format)
    location /stat {
      rtmp_stat all;
      rtmp_stat_stylesheet stat.xsl;
      add_header Access-Control-Allow-Origin *;
    }

    # Health check
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}

# ============================================================
# QUICK START GUIDE:
# ============================================================
# 1. Start Nginx: sudo nginx
# 2. Verify: curl http://localhost:8080/health
#
# 3. Stream from OBS/FFmpeg:
#    - RTMP Server: rtmp://localhost:1935/live
#    - Stream Key: your-stream-key-uuid
#    - Full URL: rtmp://localhost:1935/live/your-stream-key-uuid
#
# 4. Watch HLS stream:
#    - URL: http://localhost:8080/hls/your-stream-key-uuid.m3u8
#
# 5. Stop Nginx: sudo nginx -s stop
# 6. Reload config: sudo nginx -s reload
#
# ============================================================
# PRODUCTION NOTES:
# ============================================================
# - Change listen port for security (not standard RTMP)
# - Use firewalls to restrict access (allow publish from trusted IPs)
# - Enable SSL/TLS for secure streaming
# - Monitor /var/log/nginx/error.log for issues
# - Set appropriate max connections and timeouts
# - Consider using separate box for RTMP server
# - Use CDN (Cloudflare, Akamai) for HLS distribution
# ============================================================
